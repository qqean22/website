<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Page not found | Creative Studio</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-page { min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .error-page h1 { font-family: 'Delight', sans-serif; font-weight: 900; font-size: clamp(2rem, 5vw, 4rem); color: #000; margin-bottom: 0.5rem; }
        .error-page p { color: #343434; margin-bottom: 1.5rem; }
        .error-page a { color: #000; text-decoration: underline; }
    </style>
</head>
<body>
    <main class="error-page">
        <h1>Page not found</h1>
        <p>The page you’re looking for doesn’t exist.</p>
        <a href="index.html">Back to home</a>
    </main>

</html>
